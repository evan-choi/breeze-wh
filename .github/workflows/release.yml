name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: pwsh
        run: |
          $output = cargo publish 2>&1
          $exit = $LASTEXITCODE
          $output | Write-Output
          if ($exit -ne 0) {
            if ($output -match "already exists on crates.io") {
              Write-Output "::notice::Version already published — skipping."
              exit 0
            }
            exit $exit
          }
      - run: cargo build --release
      - name: Rename binary
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Path dist -Force
          Copy-Item target/release/breeze-wh.exe "dist/breeze-wh-$v-windows-x86_64.exe"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
