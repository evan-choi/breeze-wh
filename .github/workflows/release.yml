name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Package
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}"
          $dir = "dist/breeze-wh-$v"
          New-Item -ItemType Directory -Path $dir -Force
          Copy-Item target/release/breeze-wh.exe $dir/
          Copy-Item README.md                    $dir/
          Copy-Item LICENSE-MIT                  $dir/
          Copy-Item LICENSE-APACHE               $dir/
          Compress-Archive -Path $dir -DestinationPath "dist/breeze-wh-$v-windows-x86_64.zip"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
